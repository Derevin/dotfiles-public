# === Shared base ===
source-file ~/.tmux-base.conf

# === Sensible defaults ===
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
# No destroy-unattached — .bashrc names sessions by PID, kills dead PIDs on new tab

# === Direct Alt keybindings (no prefix needed) ===

# Splitting (unshifted: 50/50, shifted: 75/25)
bind -n M-'\' run-shell '~/.local/bin/wt-split.sh h'
bind -n M-'-' run-shell '~/.local/bin/wt-split.sh v'
bind -n M-'|' run-shell '~/.local/bin/wt-split.sh h -l 25%'
bind -n M-'_' run-shell '~/.local/bin/wt-split.sh v -l 25%'

# Pane navigation
bind -n M-Left if -F '#{pane_at_left}' '' 'select-pane -L'
bind -n M-Down if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind -n M-Up if -F '#{pane_at_top}' '' 'select-pane -U'
bind -n M-Right if -F '#{pane_at_right}' '' 'select-pane -R'

# Pane resizing (coarse: 5 cells)
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Down resize-pane -D 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Right resize-pane -R 5

# Pane resizing (fine: 1 cell)
bind -n C-M-S-Left resize-pane -L 1
bind -n C-M-S-Down resize-pane -D 1
bind -n C-M-S-Up resize-pane -U 1
bind -n C-M-S-Right resize-pane -R 1

# Direct pane select by number (quadrant-aware: prefer tagged pane, fallback to index)
bind -n M-1 run-shell '~/.local/bin/cc-select-pane.sh 1'
bind -n M-2 run-shell '~/.local/bin/cc-select-pane.sh 2'
bind -n M-3 run-shell '~/.local/bin/cc-select-pane.sh 3'
bind -n M-4 run-shell '~/.local/bin/cc-select-pane.sh 4'
bind -n M-5 run-shell '~/.local/bin/cc-select-pane.sh 5'
bind -n M-6 run-shell '~/.local/bin/cc-select-pane.sh 6'
bind -n M-7 run-shell '~/.local/bin/cc-select-pane.sh 7'
bind -n M-8 run-shell '~/.local/bin/cc-select-pane.sh 8'
bind -n M-9 run-shell '~/.local/bin/cc-select-pane.sh 9'

# Direct window select by shifted number (Alt+Shift+1..9 → window 1..9)
bind -n M-'!' select-window -t :1
bind -n M-'@' select-window -t :2
bind -n M-'#' select-window -t :3
bind -n M-'$' select-window -t :4
bind -n M-'%' select-window -t :5
bind -n M-'^' select-window -t :6
bind -n M-'&' select-window -t :7
bind -n M-'*' select-window -t :8
bind -n M-'(' select-window -t :9

# Zoom / Inspect
bind -n M-z resize-pane -Z
bind -n M-x if -F '#{||:#{==:#{window_name},overview},#{m:i?,#{window_name}}}' 'run-shell "~/.local/bin/cc-inspect.sh >/dev/null 2>&1"' ''

# Copy mode
bind -n M-v copy-mode

# Close pane / window
bind -n M-w run-shell "~/.local/bin/cc-close-pane.sh >/dev/null 2>&1"
bind -n M-W run-shell "~/.local/bin/cc-close-window.sh >/dev/null 2>&1"

# Popup shortcuts
bind -n M-g run-shell 'tmux set-environment -g DIFFVIEW_CALLER "$(tmux display-message -p "##{pane_id}")"' \; display-popup -d "#{pane_current_path}" -w 97% -h 97% -E "tmux -L popup -f ~/.tmux-popup.conf new-session 'wt-popup @DIFFVIEW_CALLER -- diffview t w x'"
bind -n M-f run-shell 'tmux set-environment -g DIFFVIEW_CALLER "$(tmux display-message -p "##{pane_id}")"' \; display-popup -d "#{pane_current_path}" -w 97% -h 97% -E "tmux -L popup -f ~/.tmux-popup.conf new-session 'wt-popup @DIFFVIEW_CALLER -- diffview w x'"
bind -n M-b run-shell 'tmux set-environment -g DIFFVIEW_CALLER "$(tmux display-message -p "##{pane_id}")"' \; display-popup -d "#{pane_current_path}" -w 97% -h 97% -E "tmux -L popup -f ~/.tmux-popup.conf new-session 'wt-popup @DIFFVIEW_CALLER -- diffview m w x'"
bind -n M-e run-shell 'tmux set-environment -g MICRO_CALLER "$(tmux display-message -p "##{pane_id}")"' \; display-popup -d "#{pane_current_path}" -w 97% -h 97% -E "tmux -L popup -f ~/.tmux-popup.conf new-session 'wt-popup @MICRO_CALLER -- micro-session.sh'"
bind -n M-E display-popup -d "#{pane_current_path}" -w 97% -h 97% -E "tmux -L popup -f ~/.tmux-popup.conf new-session 'nvim'"
bind -n M-j run-shell 'tmux set-environment -g JUST_CALLER "$(tmux display-message -p "##{pane_id}")"' \; display-popup -d "#{pane_current_path}" -w 97% -h 97% -E "tmux -L popup -f ~/.tmux-popup.conf new-session 'exec ~/.local/bin/cc-just.sh'"
bind -n M-t run-shell "~/.local/bin/cc-scratch.sh >/dev/null 2>&1"

# Window navigation
bind -n M-o run-shell "~/.local/bin/cc-nav.sh prev >/dev/null 2>&1"
bind -n M-p run-shell "~/.local/bin/cc-nav.sh next >/dev/null 2>&1"
bind -n M-'[' previous-window
bind -n M-']' next-window
bind -n M-n new-window -c "#{pane_current_path}"

# === Status bar ===
# Light gray (VS Code light theme style)
set -g status-style "bg=#DDDDDD,fg=#333333"
set -g status-left ""
set -g status-right "%H:%M "
set -g window-status-format "#{?@hidden,, #{?#{window_bell_flag},#[bold]!,}#I:#W }"
set -g window-status-current-format "#{?@hidden,, #{?#{window_bell_flag},#[bold]!,}#[bold]#I:#W#{?window_zoomed_flag, Z,}#[nobold] }"
set -g window-status-current-style "bg=#555555,fg=#FFFFFF"
set -g window-status-bell-style ""
setw -g monitor-bell on
set -g visual-bell off

# Kill orphaned inspect windows when overview is closed (run-shell suppresses errors in popups)
set-hook -g window-unlinked 'run-shell "tmux list-windows -F \"####{window_name}\" | grep -qE \"^i[0-9]*[1-9]\" && ! tmux list-windows -F \"####{window_name}\" | grep -q \"^overview\" && tmux list-windows -F \"####{window_name}\" | grep -E \"^i[0-9]*[1-9]\" | xargs -I{} tmux kill-window -t :{} 2>/dev/null; true"'
set -g status on

# === Pane borders ===
set -g pane-border-lines double
set -g pane-border-style "fg=#CCCCCC"
set -g pane-active-border-style "fg=#2E8B57"
set -g status-interval 1
