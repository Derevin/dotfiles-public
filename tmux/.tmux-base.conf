# Shared tmux settings — sourced by both main and popup configs
set -g escape-time 0
set -g mouse on
# Default to screen-256color (always present); upgrade to tmux-256color when its
# terminfo exists (WSL/Linux). tmux-256color advertises Sync (synchronized output,
# fixes irregular redraw/cursor flicker in fzf/nvim popups) and Ss/Se cursor style.
# tmux-256color terminfo is missing on Git Bash, hence the conditional.
set -g default-terminal "screen-256color"
if-shell 'infocmp tmux-256color >/dev/null 2>&1' 'set -g default-terminal "tmux-256color"'
set -ga terminal-overrides ",*256col*:Tc"
# Tell tmux the outer terminal supports synchronized output (Alacritty 0.13+, WT
# 1.16+) so it repaints atomically — the actual flicker fix.
set -as terminal-features ",*:sync"
# Forward Ctrl+Shift+arrow (and other modified keys) to apps that request them —
# micro binds Ctrl+Shift+Up/Down for multicursor. Both servers inherit this.
set -g extended-keys on
set -g default-command "bash"
set -g focus-events on
setw -g mode-keys vi

# Clipboard (platform-specific)
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection
if-shell 'command -v clip.exe >/dev/null' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"'
