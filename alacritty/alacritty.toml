[general]
import = ["platform.toml"]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\n"

[[keyboard.bindings]]
key = "Back"
mods = "Control"
chars = "\u001b\u007f"

[[keyboard.bindings]]
key = "Delete"
mods = "Control"
chars = "\u001bd"

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"

[scrolling]
history = 50000

[window]
dimensions = { columns = 120, lines = 40 }
padding = { x = 0, y = 0 }
dynamic_padding = true

[cursor.style]
shape = "Beam"

[font]
size = 14.0

[font.normal]
family = "JetBrains Mono"

# Solarized Light High Contrast
[colors.primary]
background = "#fdf6e3"
foreground = "#002b36"

[colors.cursor]
text = "#fdf6e3"
cursor = "#002b36"

[colors.selection]
text = "#002b36"
background = "#eee8d5"

[colors.normal]
black = "#073642"
red = "#dc322f"
green = "#859900"
yellow = "#b58900"
blue = "#268bd2"
magenta = "#d33682"
cyan = "#2aa198"
white = "#eee8d5"

[colors.bright]
black = "#002b36"
red = "#cb4b16"
green = "#586e75"
yellow = "#657b83"
blue = "#839496"
magenta = "#6c71c4"
cyan = "#93a1a1"
white = "#fdf6e3"
