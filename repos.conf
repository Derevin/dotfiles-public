# Sibling repos under ~/repos, managed by dotfiles_install.py and sync.sh.
# Columns: name  tier  remote
#   core  = cloned automatically by the installer
#   extra = opt-in via: dotfiles_install.py --extra <name> [<name> ...]
# Cloned to ~/repos/<name>; the remote's own name may differ.
#
# Template — add your own repos below (all examples commented out by default):
# tasks    core   git@github.com:you/tasks.git
# context  core   git@github.com:you/context.git
# myproj   extra  git@github.com:you/myproj.git
